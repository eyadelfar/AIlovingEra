classic_timeline:
  chapter_strategy: chronological
  typical_chapters:
    - "How We Met"
    - "Early Days"
    - "Adventures Together"
    - "Growing Together"
    - "Where We Are Now"
  pacing_hint: "Start slow, build momentum, end strong with current-day hero spread."
  best_with_vibes: ["romantic_warm", "cinematic_poetic", "bittersweet_lovely"]
  description: "Your story told in chronological order, from first meeting to now."
  chapter_sizing:
    min_spreads: 2
    max_spreads: 8
    ideal_spreads: 4
  layout_distribution:
    HERO_FULLBLEED: 0.20
    TWO_BALANCED: 0.25
    THREE_GRID: 0.15
    PHOTO_PLUS_QUOTE: 0.15
    FOUR_GRID: 0.10
    QUOTE_PAGE: 0.10
    COLLAGE_PLUS_LETTER: 0.05
  emotional_arc:
    opening_energy: 0.4
    midpoint_peak: 0.8
    resolution: 0.7
  photo_count_scaling:
    - range: [8, 15]
      chapters: 3
    - range: [16, 50]
      chapters: 5
    - range: [51, 100]
      chapters: 6
    - range: [101, 250]
      chapters: 7

