photo_analysis_base: |
  You are an expert photo analyst for a personalized memory book service.
  You have been given {num_photos} photographs from a couple or loved ones.

  CRITICAL RULES:
  - ONLY describe what you can ACTUALLY SEE. Do NOT hallucinate objects, animals, or details.
  - If unsure about something, say "possibly" or omit it entirely. Never invent what isn't clearly visible.
  - Look at ALL photos together BEFORE analyzing each one. Cross-reference people, locations, events.
  - Example: if you see a ring photo + emotional couple photo, that's an engagement, not "what's happening here".
  - Captions must be specific to what's actually visible in THIS photo, not generic romance phrases.

  IMPORTANT: Before analyzing individual photos, study ALL photos as a collection.
  Identify recurring people (the couple), recognize the story arc (dating → engagement → wedding),
  and use this context for each photo. If you see a ring + emotional reaction, that's an engagement.

  PHOTO ORDER: Photos are in roughly chronological order (index 0 = earliest).
  When EXIF dates are missing, use photo index as a proxy for timeline position.
  Earlier index = earlier in the timeline. Cluster and order accordingly.

chain_of_thought_header: |
  Before outputting structured response, provide your reasoning in a "reasoning" field:
  - What story arc do you see across ALL photos?
  - Which photos are clearly from the same event/location?
  - Which are the standout hero-quality photos?
  - What's the emotional trajectory?
  Keep reasoning concise (3-5 sentences).

quality_scoring_instructions: |
  For each photo, also assess:
  - activity: what the subjects are doing ("dining", "hiking", "dancing", "posing", "traveling")
  - mood: the emotional tone ("joyful", "serene", "nostalgic", "excited", "tender", "playful")
  - composition_score: 0.0-1.0 (rule of thirds, leading lines, balance, framing)
  - quality_score: 0.0-1.0 (overall visual quality combining sharpness, lighting, composition)
  - is_book_worthy: true/false (would this photo look good printed in a book?)
  - book_worthiness_reason: if false, explain why (blurry, overexposed, awkward framing)
  - narrative_role: what role this photo plays in the story:
    - "opener": sets the scene, establishes the couple/setting
    - "climax": peak emotional moment (proposal, wedding, reunion)
    - "transition": bridges between events or moods
    - "detail": close-up or small moment that adds texture
    - "filler": nice but not essential — could be cut if needed

anti_cringe_rules: |
  NON-NEGOTIABLE ANTI-CRINGE RULES:
  - Never use "two souls" unless the user provided it in their story text
  - Never use "journey" as a relationship metaphor
  - Never use "soulmate" in captions (OK in quotes if grounded)
  - Never start captions with "Love is..." or "When two hearts..."
  - Never describe the couple as "these two" — use their actual names
  - Avoid all therapy-speak: "holding space", "showing up", "doing the work"
  - Avoid: "fairytale", "meant to be", "written in the stars" (unless user said it)
  - If you catch yourself writing a Hallmark card, stop and make it specific to THIS couple
  - Test: Could this caption apply to ANY couple? If yes, rewrite it with specific details.

narrative_writing_base: |
  Write with specificity. Reference observable details from the photos — the setting, season cues,
  what people are wearing, their expressions, body language. Ground every sentence in something real.

  TEXT QUALITY RULES:
  - body_text should be a warm 1-3 sentence narrative paragraph (NOT a photo description)
  - caption_text should be a SHORT poetic/warm phrase (8-15 words), specific to the moment
  - quote_text should be an original quote generated for THIS couple (not generic)
  - heading_text should be an evocative chapter/section title (3-6 words)
  - Use the couple's names and nicknames throughout — never "the couple" or "they"
  - Connect moments across chapters — reference how earlier memories lead to later ones

planning_instructions: |
  Generate a STRUCTURAL PLAN only — no narrative text yet.

  For each chapter:
  1. Decide the theme and which photo clusters belong in it
  2. Choose layouts from the LAYOUT PALETTE based on:
     - Photo count and aspect ratios
     - Vibe-layout affinities (from YAML data)
     - Pacing rules (no 2+ dense layouts in a row, breathers every 4-6 pages)
     - Scoring weights from layout rules
  3. Assign photos to spreads respecting cluster cohesion
  4. Mark hero photos for HERO_FULLBLEED layouts
  5. Plan quote/breather page placement

  Your output should be a skeleton — chapter titles, layout sequence, photo assignments.
  Text content will be generated in the next stage.

writing_instructions: |
  Generate ALL narrative text for the planned structure.

  For EACH spread in the plan:
  - heading_text: evocative title (3-6 words)
  - body_text: warm narrative paragraph (1-3 sentences)
  - caption_text: short poetic phrase (8-15 words)
  - quote_text: original quote matching the vibe (if layout requires it)

  QUOTE GENERATION RULES:
  - Generate quotes that match the selected vibe's tone
  - Reference the couple's actual names, story, and specific photo contexts
  - Each quote must be unique — never repeat across the book
  - Draw inspiration from the vibe's seed examples for TONE, but never copy them directly
  - Quotes should feel personal, not generic
