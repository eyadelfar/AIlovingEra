<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#130520"/>
      <stop offset="100%" stop-color="#07020e"/>
    </linearGradient>
    <linearGradient id="face" x1="5%" y1="0%" x2="95%" y2="110%">
      <stop offset="0%"   stop-color="#e11d48"/>
      <stop offset="48%"  stop-color="#db2777"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%"   stop-color="#9d174d" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>

  <!-- Mouse ears -->
  <circle cx="11"  cy="8.5" r="5.8" fill="url(#face)"/>
  <circle cx="29"  cy="8.5" r="5.8" fill="url(#face)"/>
  <circle cx="10.2" cy="7.2" r="2.4" fill="#f43f5e" opacity="0.4"/>
  <circle cx="28.2" cy="7.2" r="2.4" fill="#a855f7" opacity="0.4"/>

  <!-- Polaroid / mouse-face rectangle -->
  <rect x="5" y="9" width="30" height="26" rx="5" fill="url(#face)"/>

  <!-- Inner depth glow -->
  <ellipse cx="20" cy="20" rx="13" ry="11" fill="url(#glow)"/>

  <!-- Photo inset — dark window -->
  <rect x="8.5" y="12" width="23" height="16" rx="3" fill="#0d0118" opacity="0.75"/>

  <!-- Camera-aperture 12-point star -->
  <path d="M20 16.4 L20.75 18.7 L23.12 18.2 L23.6 20
           L23.12 21.8 L20.75 21.3 L20 23.6
           L19.25 21.3 L16.88 21.8 L16.4 20
           L16.88 18.2 L19.25 18.7 Z"
        fill="url(#star)" opacity="0.97"/>
  <circle cx="24.5" cy="15.5" r="0.9" fill="#fde68a" opacity="0.8"/>

  <!-- Eyes -->
  <circle cx="15.5" cy="17.5" r="1.4" fill="white" opacity="0.82"/>
  <circle cx="24.5" cy="17.5" r="1.4" fill="white" opacity="0.82"/>

  <!-- Smile -->
  <path d="M17 23.5 Q20 25.5 23 23.5"
        stroke="white" stroke-width="0.9" fill="none"
        opacity="0.45" stroke-linecap="round"/>
</svg>
